<script>
    console.log('JS_API Loaded v1.0.3');
    /**
     * 前端 API 封裝 (與 Google Apps Script 溝通層)
     * 使用 Promise 確保所有的呼叫都是非同步可等待的
     */
    window.api = {

        /**
         * 發送請求至後端 doPost
         * @param {string} action - 請求的方法，例如 'Catalog.getAll'
         * @param {Object} payload - 傳遞的參數
         */
        request(action, payload = {}) {
            return new Promise((resolve, reject) => {
                // 開發環境 (本機端)
                if (typeof google === 'undefined' || typeof google.script === 'undefined') {
                    console.warn(`[DEV MODE] Mock API Call: ${action}`, payload);
                    if (window.mockApi && typeof window.mockApi[action] === 'function') {
                        setTimeout(() => {
                            resolve(window.mockApi[action](payload));
                        }, 500);
                    } else {
                        reject(new Error(`Mock API not found for action: ${action}`));
                    }
                    return;
                }

                // 正式環境 (GAS 內)
                const postData = JSON.stringify({ action, payload });

                google.script.run
                    .withSuccessHandler((res) => {
                        console.log(`[API Response] ${action}:`, res);
                        if (res && res.success === false) {
                            reject(new Error(res.error || 'API 錯誤'));
                        } else if (res && res.success === true) {
                            resolve(res); // 這裡回傳整個物件，包含 .data
                        } else {
                            // 處理舊版或非預期格式
                            resolve({ success: true, data: res });
                        }
                    })
                    .withFailureHandler((error) => {
                        console.error('GAS Error:', error);
                        reject(error);
                    })
                    .routeApi(JSON.parse(postData)); // 呼叫 Code.gs 中的 routeApi()
            });
        },

        catalog: {
            getAll: () => api.request('Catalog.getAll'),
            getById: (id) => api.request('Catalog.getById', { id }),
            create: (data) => api.request('Catalog.create', { data }),
            update: (id, data) => api.request('Catalog.update', { id, data }),
            delete: (id) => api.request('Catalog.delete', { id }),
            getPricingMethods: () => api.request('Catalog.getPricingMethods')
        },

        client: {
            getAll: () => api.request('Client.getAll'),
            getById: (id) => api.request('Client.getById', { id }),
            getFullProfile: (id) => api.request('Client.getFullProfile', { id }),
            create: (data) => api.request('Client.create', { data }),
            update: (id, data) => api.request('Client.update', { id, data }),
            delete: (id) => api.request('Client.delete', { id })
        },

        contact: {
            getByClientId: (clientId) => api.request('Contact.getByClientId', { clientId }),
            create: (data) => api.request('Contact.create', { data }),
            update: (id, data) => api.request('Contact.update', { id, data }),
            delete: (id) => api.request('Contact.delete', { id })
        },

        note: {
            getByClientId: (clientId) => api.request('Note.getByClientId', { clientId }),
            create: (data) => api.request('Note.create', { data }),
            delete: (id) => api.request('Note.delete', { id })
        },

        quotation: {
            getAll: () => api.request('Quotation.getAll'),
            getById: (id) => api.request('Quotation.getById', { id }),
            create: (data) => api.request('Quotation.create', { data }),
            update: (id, data) => api.request('Quotation.update', { id, data }),
            delete: (id) => api.request('Quotation.delete', { id })
        },

        template: {
            getNotes: () => api.request('Template.getNotes'),
            getPaymentTerms: () => api.request('Template.getPaymentTerms')
        }
    };
</script>
