<script>
console.log('JS_APP Loaded');
/**
 * Vue 3 主應用程式與路由控制器
 */
const { createApp, ref, computed, onMounted } = Vue;

// 頁面元件 (尚未實作實體內容，僅佔位)
const DashboardView = { 
    template: `
        <div>
            <div class="row g-4 mb-4">
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm bg-primary text-white">
                        <div class="card-body">
                            <h6 class="card-title opacity-75 small">本月報價件數</h6>
                            <h2 class="mb-0 fw-bold">{{ stats.count }}</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body">
                            <h6 class="card-title text-muted small">待處理客戶回覆</h6>
                            <h2 class="mb-0 fw-bold">0</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body">
                            <h6 class="card-title text-muted small">本月預估營業額</h6>
                            <h2 class="mb-0 fw-bold">{{ formatCurrency(stats.total) }}</h2>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-lg-8">
                    <div class="card border-0 shadow-sm mb-4">
                        <div class="card-header bg-white py-3">
                            <h5 class="card-title mb-0">最近建立的報價單</h5>
                        </div>
                        <div class="card-body text-center py-5 text-muted" v-if="recent.length === 0">目前尚無近期活動資料</div>
                        <div class="card-body p-0" v-else>
                            <div class="table-responsive">
                                <table class="table table-hover align-middle mb-0">
                                    <tbody>
                                        <tr v-for="q in recent" :key="q.quotationId">
                                            <td class="ps-3">
                                                <div class="fw-bold">{{ q.clientName }}</div>
                                                <div class="text-muted small">{{ q.quotationId }}</div>
                                            </td>
                                            <td>{{ q.projectName || '未命名專案' }}</td>
                                            <td class="text-end pe-3">
                                                <div class="fw-bold">{{ formatCurrency(q.grandTotal) }}</div>
                                                <span class="badge bg-light text-dark border">{{ q.status }}</span>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-4">
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white py-3">
                            <h5 class="card-title mb-0">快速操作</h5>
                        </div>
                        <div class="list-group list-group-flush">
                            <a href="#" class="list-group-item list-group-item-action py-3" @click.prevent="$emit('navigate', 'quotation-form')">
                                <i class="bi bi-plus-circle me-2 text-primary"></i>建立新報價單
                            </a>
                            <a href="#" class="list-group-item list-group-item-action py-3" @click.prevent="$emit('navigate', 'clients')">
                                <i class="bi bi-people me-2 text-primary"></i>新增客戶資料
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    `,
    setup() {
        const recent = ref([]);
        const stats = ref({ count: 0, total: 0 });

        const loadDashboard = async () => {
            try {
                const res = await api.quotation.getAll();
                console.log('[Dashboard] API raw response:', JSON.stringify(res));
                const list = res.data || [];
                console.log('[Dashboard] list length:', list.length);
                if (list.length > 0) console.log('[Dashboard] first item:', JSON.stringify(list[0]));
                recent.value = list.slice(0, 5);
                stats.value = {
                    count: list.length,
                    total: list.reduce((sum, q) => sum + (Number(q.grandTotal) || 0), 0)
                };
            } catch (e) {
                console.error('Dashboard Load Error:', e);
            }
        };

        const formatCurrency = (val) => new Intl.NumberFormat('zh-TW', { style: 'currency', currency: 'TWD', minimumFractionDigits: 0 }).format(val);

        onMounted(loadDashboard);

        return { recent, stats, formatCurrency };
    }
};
// 報價單列表
const QuotationListView = {
    template: `
        <div>
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="page-title mb-0">報價單管理</h2>
                <div class="d-flex gap-2">
                    <select class="form-select form-select-sm" style="width: auto;" v-model="statusFilter">
                        <option value="">全部狀態</option>
                        <option value="草稿">草稿</option>
                        <option value="已報價">已報價</option>
                        <option value="已成交">已成交</option>
                        <option value="未成交">未成交</option>
                        <option value="作廢">作廢</option>
                    </select>
                    <button class="btn btn-primary shadow-sm" @click="$emit('navigate', 'quotation-form')">
                        <i class="bi bi-plus-lg me-1"></i>建立報價單
                    </button>
                </div>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>報價編號</th>
                                    <th>客戶名稱</th>
                                    <th>專案名稱</th>
                                    <th>金額 (未稅)</th>
                                    <th>狀態</th>
                                    <th class="text-end">操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr v-if="filteredList.length === 0">
                                    <td colspan="6" class="text-center py-5 text-muted">
                                        <i class="bi bi-inbox fs-2 d-block mb-2"></i>
                                        {{ statusFilter ? '無符合篩選條件的報價單' : '尚未建立任何報價單' }}
                                    </td>
                                </tr>
                                <tr v-for="q in filteredList" :key="q.quotationId">
                                    <td>{{ q.quotationId }}</td>
                                    <td>{{ q.clientName }}</td>
                                    <td>{{ q.projectName || '-' }}</td>
                                    <td>{{ formatCurrency(q.subtotal) }}</td>
                                    <td><span class="badge" :class="statusBadge(q.status)">{{ q.status }}</span></td>
                                    <td class="text-end">
                                        <!-- 草稿狀態：可編輯、可送出報價、可作廢 -->
                                        <template v-if="q.status === '草稿'">
                                            <button class="btn btn-sm btn-outline-primary me-1" @click="$emit('navigate', 'quotation-form', { quotationId: q.quotationId })" title="編輯">
                                                <i class="bi bi-pencil"></i>
                                            </button>
                                            <button class="btn btn-sm btn-success me-1" @click="changeStatus(q, '已報價')" title="送出報價">
                                                <i class="bi bi-send"></i>
                                            </button>
                                            <button class="btn btn-sm btn-outline-danger" @click="changeStatus(q, '作廢')" title="作廢">
                                                <i class="bi bi-x-circle"></i>
                                            </button>
                                        </template>
                                        <!-- 已報價狀態：可標記成交/未成交/作廢 -->
                                        <template v-else-if="q.status === '已報價'">
                                            <button class="btn btn-sm btn-success me-1" @click="changeStatus(q, '已成交')" title="標記為已成交">
                                                <i class="bi bi-check-circle"></i> 成交
                                            </button>
                                            <button class="btn btn-sm btn-warning me-1" @click="changeStatus(q, '未成交')" title="標記為未成交">
                                                <i class="bi bi-x-circle"></i> 未成交
                                            </button>
                                            <button class="btn btn-sm btn-outline-danger" @click="changeStatus(q, '作廢')" title="作廢">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </template>
                                        <!-- 最終狀態：僅可查看 -->
                                        <template v-else>
                                            <button class="btn btn-sm btn-outline-secondary" @click="$emit('navigate', 'quotation-form', { quotationId: q.quotationId })" title="查看">
                                                <i class="bi bi-eye"></i>
                                            </button>
                                        </template>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    `,
    setup(props, { emit }) {
        const list = ref([]);
        const isLoading = ref(false);
        const statusFilter = ref('');

        const filteredList = computed(() => {
            if (!statusFilter.value) return list.value;
            return list.value.filter(q => q.status === statusFilter.value);
        });

        const statusBadge = (status) => {
            const map = {
                '草稿': 'bg-secondary',
                '已報價': 'bg-primary',
                '已成交': 'bg-success',
                '未成交': 'bg-warning text-dark',
                '作廢': 'bg-danger'
            };
            return map[status] || 'bg-secondary';
        };

        const loadData = async () => {
            isLoading.value = true;
            try {
                const res = await api.quotation.getAll();
                list.value = res.data || [];
            } catch (e) {
                console.error('Load Error:', e);
            } finally {
                isLoading.value = false;
            }
        };

        const changeStatus = async (q, newStatus) => {
            const confirmMsg = {
                '已報價': `確定要將報價單「${q.quotationId}」送出給客戶嗎？送出後將無法再編輯內容。`,
                '已成交': `確定要將報價單「${q.quotationId}」標記為已成交嗎？`,
                '未成交': `確定要將報價單「${q.quotationId}」標記為未成交嗎？`,
                '作廢': `確定要將報價單「${q.quotationId}」作廢嗎？`
            };

            if (!confirm(confirmMsg[newStatus] || `確定要變更狀態為「${newStatus}」嗎？`)) return;

            try {
                await api.quotation.updateStatus(q.quotationId, newStatus);
                alert(`狀態已更新為「${newStatus}」！`);
                loadData();
            } catch (e) {
                console.error('Status Update Error:', e);
                alert('狀態更新失敗：' + e.message);
            }
        };

        onMounted(loadData);

        const formatCurrency = (val) => new Intl.NumberFormat('zh-TW', { style: 'currency', currency: 'TWD', minimumFractionDigits: 0 }).format(Number(val) || 0);
        return { list, filteredList, isLoading, statusFilter, statusBadge, formatCurrency, loadData, changeStatus };
    }
};

// ClientView 已移至 js_client.html

// CatalogView 已移至 js_catalog.html

const app = createApp({
    setup() {
        const currentRoute = ref('home');
        const isLoading = ref(false);

        // 簡易路由對映
        const routes = {
            'home': HomeView,
            'dashboard': DashboardView,
            'clients': ClientView,
            'catalog': CatalogView,
            'quotations': QuotationListView,
            'quotation-form': QuotationFormView
        };

        const currentViewComponent = computed(() => {
            return routes[currentRoute.value] || HomeView;
        });

        // 可傳遞給子元件的 Props
        const currentViewProps = ref({});

        // 導航方法
        const navigate = (route, props = {}) => {
            isLoading.value = true;
            setTimeout(() => {
                currentRoute.value = route;
                currentViewProps.value = props;
                isLoading.value = false;
            }, 300);
        };

        // 全域 Loading 控制
        const withLoading = async (asyncFn) => {
            isLoading.value = true;
            try {
                return await asyncFn();
            } finally {
                isLoading.value = false;
            }
        };

        onMounted(() => {
            console.log('App Mounted');
        });

        return {
            currentRoute,
            currentViewComponent,
            currentViewProps,
            navigate,
            isLoading,
            withLoading
        };
    }
});

app.mount('#app');
</script>
